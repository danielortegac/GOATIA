<script id="gfy-language-toggle-script-v33">
(function(){
  'use strict';

  var htmlLang = (document.documentElement.getAttribute('lang') || '').toLowerCase();
  var path = (location.pathname || '').toLowerCase();
  var SOURCE_LANG = (htmlLang.indexOf('en') === 0 || path.indexOf('/en/') === 0 || path === '/en') ? 'en' : 'es';
  var TARGET_LANGS = ['es','en'];
  var COOKIE_DAYS = 365;
  var MANUAL_KEY = 'goatify_lang_manual_v37';
  var AUTO_KEY = 'goatify_lang_auto_v33';
  var COUNTRY_KEY = 'goatify_ip_country_v33';
  var LEGACY_MANUAL_KEY = 'goatify_lang_manual_v9';
  var LEGACY_KEY = 'goatify_lang_v7';
  var RELOAD_GUARD_KEY = 'goatify_lang_reload_guard_v37';

  // Regla pedida: IP manda por encima del idioma del navegador/computadora.
  // Ecuador, Colombia, México, LatAm y España => ES. Estados Unidos y resto no LatAm => EN.
  // Botón manual ES/EN manda por encima de IP y se guarda en el navegador.
  var SPANISH_IP_COUNTRIES = {
    AR:1, BO:1, BR:1, BZ:1, CL:1, CO:1, CR:1, CU:1, DO:1, EC:1, ES:1,
    GT:1, HN:1, MX:1, NI:1, PA:1, PE:1, PR:1, PY:1, SV:1, UY:1, VE:1
  };

  function validLang(lang){ return TARGET_LANGS.indexOf(lang) >= 0 ? lang : SOURCE_LANG; }

  function unique(list){
    var out = [];
    list.forEach(function(item){ if(item !== undefined && item !== null && out.indexOf(item) < 0) out.push(item); });
    return out;
  }

  function cookieDomains(){
    var host = location.hostname || '';
    var list = [''];
    if(host && host !== 'localhost' && host.indexOf('.') > -1 && !/^\d+\.\d+\.\d+\.\d+$/.test(host)){
      list.push(host);
      var parts = host.split('.');
      if(parts.length >= 2) list.push('.' + parts.slice(-2).join('.'));
      if(parts.length >= 3 && parts[0] !== 'www') list.push('.' + parts.slice(-3).join('.'));
    }
    return unique(list);
  }

  function setCookie(name, value, domain){
    var expires = new Date(Date.now() + COOKIE_DAYS*24*60*60*1000).toUTCString();
    var cookie = name + '=' + value + '; expires=' + expires + '; path=/; SameSite=Lax';
    if(location.protocol === 'https:') cookie += '; Secure';
    if(domain) cookie += '; domain=' + domain;
    document.cookie = cookie;
  }

  function clearCookie(name, domain){
    var cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax';
    if(location.protocol === 'https:') cookie += '; Secure';
    if(domain) cookie += '; domain=' + domain;
    document.cookie = cookie;
  }

  function hasGoogTrans(){ return /(?:^|;\s*)googtrans=/.test(document.cookie || ''); }

  function clearGoogTrans(){
    cookieDomains().forEach(function(domain){ clearCookie('googtrans', domain); });
    clearCookie('googtrans');
  }

  function setGoogTrans(lang){
    lang = validLang(lang);
    clearGoogTrans();
    if(lang !== SOURCE_LANG){
      var value = '/' + SOURCE_LANG + '/' + lang;
      cookieDomains().forEach(function(domain){ setCookie('googtrans', value, domain); });
      setCookie('googtrans', value);
    }
  }

  function readGoogTransLang(){
    var match = document.cookie.match(/(?:^|;\s*)googtrans=([^;]+)/);
    if(!match) return SOURCE_LANG;
    var value = '';
    try{ value = decodeURIComponent(match[1]); }catch(e){ value = match[1] || ''; }
    if(value.indexOf('/en/es') >= 0) return 'es';
    if(value.indexOf('/es/en') >= 0) return 'en';
    var parts = value.split('/').filter(Boolean);
    return validLang(parts.length ? parts[parts.length - 1] : SOURCE_LANG);
  }

  function getStorage(key){ try{ return localStorage.getItem(key); }catch(e){ return null; } }
  function setStorage(key, value){ try{ localStorage.setItem(key, value); }catch(e){} }
  function removeStorage(key){ try{ localStorage.removeItem(key); }catch(e){} }

  function clearLegacyLanguageStateForNativeEnglish(){
    if(SOURCE_LANG !== 'en') return;
    // V37: native /en/ URLs must load in English by default.
    // Old V33/V9/V7 manual values and old googtrans cookies could force Spanish from prior tests.
    if(getStorage(MANUAL_KEY)) return;
    removeStorage('goatify_lang_manual_v33');
    removeStorage('goatify_lang_auto_v33');
    removeStorage(LEGACY_MANUAL_KEY);
    removeStorage(LEGACY_KEY);
    clearGoogTrans();
  }

  function getManualLang(){
    var lang = getStorage(MANUAL_KEY);
    if(TARGET_LANGS.indexOf(lang) >= 0) return lang;
    if(SOURCE_LANG === 'en') return null;
    lang = getStorage('goatify_lang_manual_v33') || getStorage(LEGACY_MANUAL_KEY);
    return TARGET_LANGS.indexOf(lang) >= 0 ? lang : null;
  }

  function desiredLang(){
    var manual = getManualLang();
    if(manual) return manual;
    if(SOURCE_LANG === 'en') return 'en';
    return readGoogTransLang() || SOURCE_LANG;
  }

  function mark(lang){
    lang = validLang(lang);
    document.documentElement.setAttribute('data-goatify-lang', lang);
    document.documentElement.setAttribute('data-goatify-source-lang', SOURCE_LANG);
    document.documentElement.setAttribute('lang', lang === 'en' ? 'en' : 'es');
    document.querySelectorAll('#gfy-language-toggle-v33 [data-gfy-lang]').forEach(function(btn){
      var active = btn.getAttribute('data-gfy-lang') === lang;
      btn.classList.toggle('active', active);
      btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      btn.setAttribute('translate', 'no');
    });
  }

  function useGoogleCombo(lang){
    lang = validLang(lang);
    var combo = document.querySelector('.goog-te-combo');
    if(!combo) return false;
    combo.value = lang === SOURCE_LANG ? '' : lang;
    combo.dispatchEvent(new Event('change'));
    return true;
  }

  function guardedReload(){
    var now = Date.now();
    try{
      var last = Number(sessionStorage.getItem(RELOAD_GUARD_KEY) || 0);
      if(now - last < 3500) return;
      sessionStorage.setItem(RELOAD_GUARD_KEY, String(now));
    }catch(e){}
    setTimeout(function(){ window.location.reload(); }, 90);
  }

  function syncLang(lang, reloadWhenCookieChanges){
    lang = validLang(lang);
    var before = readGoogTransLang();
    var hadCookie = hasGoogTrans();
    mark(lang);
    setGoogTrans(lang);
    if(reloadWhenCookieChanges && (before !== lang || (hadCookie && lang === SOURCE_LANG))){
      guardedReload();
      return;
    }
    if(window.google && window.google.translate){
      setTimeout(function(){ useGoogleCombo(lang); mark(lang); }, 250);
      setTimeout(function(){ useGoogleCombo(lang); mark(lang); }, 900);
    }
  }

  function applyManualLang(lang){
    lang = validLang(lang);
    setStorage(MANUAL_KEY, lang);
    setStorage(LEGACY_MANUAL_KEY, lang);
    setStorage(LEGACY_KEY, lang);
    removeStorage(AUTO_KEY);
    mark(lang);
    setGoogTrans(lang);
    guardedReload();
  }

  window.googleTranslateElementInit = function(){
    try{
      new google.translate.TranslateElement({
        pageLanguage: SOURCE_LANG,
        includedLanguages: SOURCE_LANG === 'es' ? 'en' : 'es',
        autoDisplay: false,
        multilanguagePage: true
      }, 'google_translate_element');
      setTimeout(function(){ useGoogleCombo(desiredLang()); mark(desiredLang()); }, 300);
      setTimeout(function(){ useGoogleCombo(desiredLang()); mark(desiredLang()); }, 1000);
      setTimeout(function(){ useGoogleCombo(desiredLang()); mark(desiredLang()); }, 2200);
    }catch(e){}
  };

  function ensureGoogleScript(){
    if(document.getElementById('google-translate-api-v33')) return;
    var script = document.createElement('script');
    script.id = 'google-translate-api-v33';
    script.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
    script.async = true;
    document.head.appendChild(script);
  }

  function countryToLang(countryCode){
    var cc = String(countryCode || '').trim().toUpperCase();
    if(!cc) return SOURCE_LANG;
    if(SPANISH_IP_COUNTRIES[cc]) return 'es';
    if(cc === 'US') return 'en';
    return 'en';
  }

  function fetchWithTimeout(url, ms){
    var controller = window.AbortController ? new AbortController() : null;
    var timer = setTimeout(function(){ if(controller) controller.abort(); }, ms || 2500);
    return fetch(url, { cache: 'no-store', signal: controller ? controller.signal : undefined })
      .finally(function(){ clearTimeout(timer); });
  }

  function detectCountry(){
    return fetchWithTimeout('https://ipwho.is/?fields=success,country_code', 2500)
      .then(function(response){ if(!response.ok) throw new Error('ipwho'); return response.json(); })
      .then(function(data){ if(data && data.success !== false && data.country_code) return data.country_code; throw new Error('ipwho-empty'); })
      .catch(function(){
        return fetchWithTimeout('https://get.geojs.io/v1/ip/country.json', 2500)
          .then(function(response){ if(!response.ok) throw new Error('geojs'); return response.json(); })
          .then(function(data){ return data && (data.country || data.country_code || data.countryCode); });
      })
      .catch(function(){
        return fetchWithTimeout('https://ipapi.co/json/', 2500)
          .then(function(response){ if(!response.ok) throw new Error('ipapi'); return response.json(); })
          .then(function(data){ return data && (data.country_code || data.country || data.countryCode); });
      })
      .catch(function(){ return null; });
  }

  function applyIpLanguage(){
    if(getManualLang()) return;
    detectCountry().then(function(countryCode){
      // V35: las URLs nativas en inglés (/en/...) se mantienen en inglés por defecto.
      // La traducción automática por IP se usa como fallback UX principalmente en páginas fuente ES;
      // el cambio manual ES/EN sigue mandando por encima de la IP.
      var lang = SOURCE_LANG === 'en' ? 'en' : countryToLang(countryCode);
      setStorage(AUTO_KEY, lang);
      setStorage(LEGACY_KEY, lang);
      setStorage(COUNTRY_KEY, countryCode ? String(countryCode).toUpperCase() : 'UNKNOWN');
      syncLang(lang, true);
    });
  }

  function bindButtons(){
    document.querySelectorAll('#gfy-language-toggle-v33 [data-gfy-lang]').forEach(function(btn){
      btn.addEventListener('click', function(event){
        event.preventDefault();
        applyManualLang(btn.getAttribute('data-gfy-lang') || SOURCE_LANG);
      });
    });
  }

  function init(){
    var toggle = document.getElementById('gfy-language-toggle-v33');
    if(toggle){
      toggle.classList.add('notranslate');
      toggle.setAttribute('translate', 'no');
    }
    clearLegacyLanguageStateForNativeEnglish();
    var manual = getManualLang();
    if(!manual) removeStorage(LEGACY_KEY);
    var initial = manual || (SOURCE_LANG === 'en' ? 'en' : readGoogTransLang()) || SOURCE_LANG;
    if(manual) syncLang(initial, true);
    else mark(initial);
    ensureGoogleScript();
    bindButtons();
    applyIpLanguage();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
