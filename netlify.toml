[build]
  publish = "."
  command = ""

# SEO canonical cleanup: Inicio is the canonical home (/). KBRA is retired.
[[redirects]]
  from = "/inicio"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/inicio/"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/kbra"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/kbra/"
  to = "/"
  status = 301
  force = true

[[headers]]
  for = "/inicio/*"
  [headers.values]
    X-Robots-Tag = "noindex, follow"

[[headers]]
  for = "/kbra/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/choco-cookies/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/d-core2/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"


# Ecosistema central: /soluciones/ is an alias of the canonical /ecosistema/.
[[redirects]]
  from = "/soluciones"
  to = "/ecosistema/"
  status = 301
  force = true

[[redirects]]
  from = "/soluciones/"
  to = "/ecosistema/"
  status = 301
  force = true
